<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Administrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'); *{font-family: 'Poppins', sans-serif;}</style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-200">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#0F172A]">Admin Login</h1>
            <p class="text-gray-500 text-sm">Masuk untuk mengelola SPK</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm" role="alert">
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text" name="username" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#DC2626]" required placeholder="Masukan username">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" name="password" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#DC2626]" required placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-[#0F172A] text-white font-bold py-3 rounded-lg hover:bg-[#DC2626] transition duration-300 shadow-lg">
                MASUK DASHBOARD
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="{{ url_for('home') }}" class="text-sm text-gray-500 hover:text-[#DC2626]">Kembali ke Halaman Depan</a>
        </div>
    </div>

</body>
</html>
