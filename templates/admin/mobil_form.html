{% extends "admin_base.html" %}

{% block content %}
<div class="w-full">
    
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center">
            <a href="{{ url_for('admin_mobil') }}" class="bg-white border border-gray-300 text-gray-600 hover:text-gray-900 hover:border-gray-400 w-10 h-10 flex items-center justify-center rounded-lg mr-4 transition shadow-sm">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <h1 class="text-2xl font-bold text-gray-800">
                    {% if mobil %} Edit Data Mobil {% else %} Tambah Mobil Baru {% endif %}
                </h1>
                <p class="text-sm text-gray-500">Isi spesifikasi lengkap mobil di bawah ini.</p>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6 md:p-8">
        <form method="POST" id="formMobil">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
                
                <div class="md:col-span-4 relative">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Merk Mobil</label>
                    <div class="relative">
                        <input type="text" id="input-merk" name="merk" value="{{ mobil.merk if mobil else '' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] transition pr-10" required maxlength="50" placeholder="Pilih atau ketik merk..." autocomplete="off">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                    <div id="dropdown-merk" class="hidden absolute z-30 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto custom-dropdown-list">
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Toyota">Toyota</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Mitsubishi">Mitsubishi</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Suzuki">Suzuki</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Honda">Honda</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Hyundai">Hyundai</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Daihatsu">Daihatsu</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Wuling">Wuling</div>
                    </div>
                </div>

                <div class="md:col-span-4 relative">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Model Mobil</label>
                    <div class="relative">
                        <input type="text" id="input-model" name="model" value="{{ mobil.model if mobil else '' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] transition pr-10" required maxlength="50" placeholder="Pilih atau ketik model..." autocomplete="off">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-400">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                    <div id="dropdown-model" class="hidden absolute z-30 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto custom-dropdown-list">
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Avanza">Avanza</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Xpander">Xpander</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Ertiga">Ertiga</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Xenia">Xenia</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Stargazer">Stargazer</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Brio">Brio</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Agya">Agya</div>
                        <div class="px-4 py-2.5 hover:bg-gray-100 cursor-pointer text-gray-700 text-sm font-medium transition dropdown-item" data-value="Confero">Confero</div>
                    </div>
                </div>

                <div class="md:col-span-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Varian / Tipe</label>
                    <input type="text" name="varian" value="{{ mobil.varian if mobil else '' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] transition" required maxlength="100" placeholder="Contoh: 1.5 G CVT / Ultimate">
                </div>

                <div class="md:col-span-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Transmisi</label>
                    <select name="transmisi" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] bg-white text-gray-700 cursor-pointer" required>
                        <option value="" disabled selected>-- Pilih Transmisi --</option>
                        <option value="MT" {% if mobil and mobil.transmisi == 'MT' %}selected{% endif %}>Manual (MT)</option>
                        <option value="AT" {% if mobil and mobil.transmisi == 'AT' %}selected{% endif %}>Otomatis (AT)</option>
                        <option value="CVT" {% if mobil and mobil.transmisi == 'CVT' %}selected{% endif %}>CVT</option>
                        <option value="DCT" {% if mobil and mobil.transmisi == 'DCT' %}selected{% endif %}>Dual Clutch (DCT)</option>
                    </select>
                </div>

                <div class="md:col-span-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Bahan Bakar</label>
                    <select name="bahan_bakar" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] bg-white text-gray-700 cursor-pointer" required>
                        <option value="" disabled selected>-- Pilih Bahan Bakar --</option>
                        <option value="Bensin" {% if mobil and mobil.bahan_bakar == 'Bensin' %}selected{% endif %}>Bensin</option>
                        <option value="Diesel" {% if mobil and mobil.bahan_bakar == 'Diesel' %}selected{% endif %}>Diesel</option>
                    </select>
                </div>

                <div class="md:col-span-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Harga OTR (Rp)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 font-bold">Rp</span>
                        <input type="number" name="harga" value="{{ mobil.harga if mobil else '' }}" class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] font-semibold text-gray-800 transition" required min="1" max="999999999999" placeholder="300000000">
                    </div>
                </div>

                <div class="md:col-span-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-tachometer-alt text-gray-400 mr-1"></i> Kapasitas Mesin (CC)
                    </label>
                    <input type="number" name="kapasitas_mesin" value="{{ mobil.kapasitas_mesin if mobil else '' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] transition" required min="1" max="20000" placeholder="Contoh: 1500">
                </div>

                <div class="md:col-span-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-chair text-gray-400 mr-1"></i> Kapasitas Penumpang
                    </label>
                    <input type="number" name="kapasitas_penumpang" value="{{ mobil.kapasitas_penumpang if mobil else '' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] transition" required min="1" max="100" placeholder="Contoh: 7">
                </div>

                <div class="md:col-span-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        <i class="fas fa-fill-drip text-gray-400 mr-1"></i> Kapasitas Tangki (L)
                    </label>
                    <input type="number" name="kapasitas_tangki" value="{{ mobil.kapasitas_tangki if mobil else '' }}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#DC2626] transition" required min="1" max="2000" placeholder="Contoh: 43">
                </div>
            </div>

            <div class="pt-4 border-t border-gray-100">
                <button type="submit" id="submitBtn" class="w-full bg-[#0F172A] hover:bg-[#DC2626] text-white font-bold py-4 rounded-xl transition duration-300 shadow-lg text-lg flex justify-center items-center group">
                    <i class="fas fa-save mr-2 group-hover:scale-110 transition-transform"></i> SIMPAN DATA MOBIL
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // ==========================================
    // 1. LOGIKA CUSTOM DROPDOWN (MERK & MODEL)
    // ==========================================
    function initCustomDropdown(inputId, dropdownId) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);
        const items = dropdown.querySelectorAll('.dropdown-item');

        function showDropdown() {
            closeAllDropdowns();
            dropdown.classList.remove('hidden');
        }

        input.addEventListener('click', function(e) {
            e.stopPropagation();
            showDropdown();
        });

        input.addEventListener('focus', function() {
            showDropdown();
        });

        items.forEach(item => {
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                input.value = this.getAttribute('data-value');
                dropdown.classList.add('hidden');
            });
        });
    }

    initCustomDropdown('input-merk', 'dropdown-merk');
    initCustomDropdown('input-model', 'dropdown-model');

    document.addEventListener('click', function() {
        closeAllDropdowns();
    });

    function closeAllDropdowns() {
        document.querySelectorAll('.custom-dropdown-list').forEach(list => {
            list.classList.add('hidden');
        });
    }

    // ==========================================
    // 2. VALIDASI SUBMIT FRONTEND (ANTI-OVERFLOW) + PREVENT DOUBLE SUBMIT
    // ==========================================
    const form = document.getElementById('formMobil');
    const submitBtn = document.getElementById('submitBtn');
    let isSubmitting = false;  // flag untuk mencegah double submit

    form.addEventListener('submit', function(e) {
        // Validasi field
        const harga = parseFloat(document.getElementsByName('harga')[0].value);
        const mesin = parseInt(document.getElementsByName('kapasitas_mesin')[0].value);
        const penumpang = parseInt(document.getElementsByName('kapasitas_penumpang')[0].value);
        const tangki = parseInt(document.getElementsByName('kapasitas_tangki')[0].value);

        if (harga <= 0 || harga > 999999999999) {
            alert('Input gagal! Batas harga maksimal adalah Rp 1 Triliun.');
            e.preventDefault();
            return false;
        }
        else if (mesin <= 0 || mesin > 20000) {
            alert('Input gagal! Batas kapasitas mesin adalah 20.000 CC.');
            e.preventDefault();
            return false;
        }
        else if (penumpang <= 0 || penumpang > 100) {
            alert('Input gagal! Batas kapasitas penumpang maksimal 100 orang.');
            e.preventDefault();
            return false;
        }
        else if (tangki <= 0 || tangki > 2000) {
            alert('Input gagal! Batas kapasitas tangki maksimal 2.000 Liter.');
            e.preventDefault();
            return false;
        }

        // Cegah double submit
        if (isSubmitting) {
            e.preventDefault();
            return false;
        }

        // Nonaktifkan tombol, ubah teks, dan set flag
        isSubmitting = true;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> MENYIMPAN...';
        // Jangan lupa hapus class hover background agar tetap jelas
        submitBtn.classList.remove('hover:bg-[#DC2626]');
        submitBtn.style.opacity = '0.7';
    });
</script>
{% endblock %}
