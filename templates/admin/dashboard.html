{% extends "admin_base.html" %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Dashboard Overview</h1>
    <p class="text-gray-500">Selamat datang kembali, {{ session.nama }}!</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center">
        <div class="w-14 h-14 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl mr-4">
            <i class="fas fa-car"></i>
        </div>
        <div>
            <h4 class="text-gray-500 text-sm font-medium">Total Mobil</h4>
            <p class="text-2xl font-bold text-gray-800">5 Unit</p>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center">
        <div class="w-14 h-14 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center text-2xl mr-4">
            <i class="fas fa-tasks"></i>
        </div>
        <div>
            <h4 class="text-gray-500 text-sm font-medium">Kriteria</h4>
            <p class="text-2xl font-bold text-gray-800">5 Item</p>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center">
        <div class="w-14 h-14 rounded-full bg-green-100 text-green-600 flex items-center justify-center text-2xl mr-4">
            <i class="fas fa-check-circle"></i>
        </div>
        <div>
            <h4 class="text-gray-500 text-sm font-medium">Status Sistem</h4>
            <p class="text-xl font-bold text-green-600">Active</p>
        </div>
    </div>
</div>

<div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 text-center">
    <img src="https://cdni.iconscout.com/illustration/premium/thumb/admin-panel-4439226-3728473.png" alt="Admin" class="w-64 mx-auto mb-4 opacity-80">
    <h3 class="text-xl font-bold text-gray-800">Area Administrator</h3>
    <p class="text-gray-500 mb-6">Silakan kelola data mobil dan kriteria melalui menu di samping.</p>
</div>
{% endblock %}
