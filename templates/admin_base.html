<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SPK MPV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 font-poppins">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-[#0F172A] text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 border-b border-gray-700 flex items-center gap-3">
                <i class="fas fa-shield-alt text-2xl text-[#DC2626]"></i>
                <span class="text-xl font-bold">Admin SPK</span>
            </div>
            
            <nav class="flex-1 px-4 py-6 space-y-2">
                <a href="{{ url_for('admin_dashboard') }}" class="flex items-center px-4 py-3 text-gray-300 hover:bg-[#DC2626] hover:text-white rounded-lg transition">
                    <i class="fas fa-home w-6"></i> Dashboard
                </a>
                
                <p class="px-4 text-xs font-semibold text-gray-500 uppercase mt-4 mb-2">Master Data</p>
                
                <a href="{{ url_for('admin_mobil') }}" class="flex items-center px-4 py-3 text-gray-300 hover:bg-[#DC2626] hover:text-white rounded-lg transition">
                    <i class="fas fa-car w-6"></i> Data Mobil
                </a>

                {% if session.get('role') == 'superadmin' %}
                <a href="{{ url_for('admin_users') }}" class="flex items-center px-4 py-3 text-gray-300 hover:bg-[#DC2626] hover:text-white rounded-lg transition">
                    <i class="fas fa-users w-6"></i> Data Users
                </a>
                {% endif %}
                
                <p class="px-4 text-xs font-semibold text-gray-500 uppercase mt-4 mb-2">Akun</p>
                <a href="{{ url_for('logout') }}" class="flex items-center px-4 py-3 text-red-400 hover:bg-red-900/50 rounded-lg transition">
                    <i class="fas fa-sign-out-alt w-6"></i> Logout
                </a>
            </nav>

            <div class="p-4 border-t border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gray-600 flex items-center justify-center">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium">{{ session.nama }}</p>
                        <p class="text-xs text-gray-400">
                            {{ 'Super Admin' if session.get('role') == 'superadmin' else 'Admin' }}
                        </p>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm p-4 md:hidden flex justify-between items-center">
                <span class="font-bold text-[#0F172A]">SPK Admin</span>
                <button class="text-gray-600"><i class="fas fa-bars"></i></button>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                {% block content %}
                {% endblock %}
            </main>
        </div>

    </div>

</body>
</html>
