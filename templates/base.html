<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPK - Mobil Pribadi</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-[#94A3B8] bg-opacity-10 min-h-screen flex flex-col">

    <nav class="bg-[#0F172A] text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <a href="{{ url_for('home') }}" class="text-xl font-bold hover:text-[#DC2626] transition">
                        SPK Mobil Pribadi
                    </a>
                </div>
                
                <div class="hidden md:flex space-x-6">
                    <a href="{{ url_for('home') }}" class="hover:text-[#DC2626] font-medium transition">Beranda</a>
                    <a href="{{ url_for('page_data_mobil') }}" class="hover:text-[#DC2626] font-medium transition">Data Mobil</a>
                </div>

                <div class="md:hidden">
                    <button id="menu-btn" class="text-white focus:outline-none p-1">
                        <i id="menu-icon" class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="mobile-menu" class="hidden bg-[#0F172A] text-white md:hidden shadow-lg border-t border-gray-800">
        <div class="flex flex-col px-4 py-3 space-y-2.5">
            <a href="{{ url_for('home') }}" class="py-2.5 hover:bg-[#DC2626] px-3 rounded transition text-base font-medium flex items-center space-x-2">
                <i class="fas fa-home text-sm w-5"></i>
                <span>Beranda</span>
            </a>
            <a href="{{ url_for('page_data_mobil') }}" class="py-2.5 hover:bg-[#DC2626] px-3 rounded transition text-base font-medium flex items-center space-x-2">
                <i class="fas fa-car text-sm w-5"></i>
                <span>Data Mobil</span>
            </a>
        </div>
    </div>
    
    <main class="flex-grow w-full">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-[#0F172A] text-white py-4 text-center mt-auto">
        <p class="text-sm">&copy; Muhammad Ikhsan</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuBtn = document.getElementById('menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const menuIcon = document.getElementById('menu-icon');

            menuBtn.addEventListener('click', function() {
                const isHidden = mobileMenu.classList.contains('hidden');
                
                if (isHidden) {
                    mobileMenu.classList.remove('hidden');
                    menuIcon.classList.remove('fa-bars');
                    menuIcon.classList.add('fa-times');
                } else {
                    mobileMenu.classList.add('hidden');
                    menuIcon.classList.remove('fa-times');
                    menuIcon.classList.add('fa-bars');
                }
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth >= 768) {
                    mobileMenu.classList.add('hidden');
                    menuIcon.classList.remove('fa-times');
                    menuIcon.classList.add('fa-bars');
                }
            });
        });
    </script>
</body>
</html>
